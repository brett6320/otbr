name: build

on:
  # Build on tagged releases (vX.Y.Z) — full semver matrix + latest
  push:
    tags:
      - 'v*'

  # PR builds are opt-in: comment "/build" on a PR to trigger.
  issue_comment:
    types: [created]

  # On PR merge to main, retag the PR's last-built image as :latest.
  # No rebuild — uses buildx imagetools to retag the multi-arch manifest.
  pull_request:
    types: [closed]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # -------------------------------------------------------------------
  # PR build coordinator — reacts to /build, opens a check run, resolves
  # the PR head SHA, then fans out to the per-platform builders.
  # -------------------------------------------------------------------
  pr-build-setup:
    name: PR /build setup
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '/build')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    outputs:
      sha: ${{ steps.pr.outputs.sha }}
      short_sha: ${{ steps.pr.outputs.short_sha }}
      number: ${{ steps.pr.outputs.number }}
      check_id: ${{ steps.check.outputs.id }}
    steps:
      - name: React to the trigger comment (rocket)
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });

      - name: Resolve PR head SHA
        id: pr
        uses: actions/github-script@v9
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.issue.number,
            });
            core.setOutput('sha', pr.data.head.sha);
            core.setOutput('short_sha', pr.data.head.sha.substring(0, 7));
            core.setOutput('number', context.payload.issue.number);

      # Surface this run in the PR's "Checks" tab and conversation timeline.
      # issue_comment-triggered runs are otherwise invisible to the PR.
      - name: Open check run on PR head
        id: check
        uses: actions/github-script@v9
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const res = await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'pr-build (/build)',
              head_sha: '${{ steps.pr.outputs.sha }}',
              status: 'in_progress',
              started_at: new Date().toISOString(),
              details_url: runUrl,
              output: {
                title: 'Building multi-arch image',
                summary: `Triggered by \`/build\` comment on #${{ steps.pr.outputs.number }}.\n\n[Workflow run](${runUrl})`,
              },
            });
            core.setOutput('id', res.data.id);

  # -------------------------------------------------------------------
  # Per-platform builders for PR /build. Each runs on a NATIVE runner
  # (amd64 on ubuntu-latest, arm64 on ubuntu-24.04-arm). No QEMU.
  # Pushes by digest only; the merge job below assembles the manifest.
  # -------------------------------------------------------------------
  pr-build:
    name: pr-build ${{ matrix.platform }}
    needs: pr-build-setup
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Prepare platform tag
        id: plat
        run: |
          p="${{ matrix.platform }}"
          echo "pair=${p//\//-}" >> "$GITHUB_OUTPUT"

      - name: Checkout PR head
        uses: actions/checkout@v7
        with:
          ref: refs/pull/${{ needs.pr-build-setup.outputs.number }}/head
          fetch-depth: 0

      - name: Read VERSION
        id: version
        run: echo "value=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.value }}
            org.opencontainers.image.revision=${{ needs.pr-build-setup.outputs.sha }}
          build-args: |
            IMAGE_VERSION=${{ steps.version.outputs.value }}
            IMAGE_REVISION=${{ needs.pr-build-setup.outputs.sha }}
          # Push only the manifest digest; the merge job names the tags.
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          # Per-platform gha cache scope so amd64 and arm64 don't fight.
          cache-from: type=gha,scope=pr-build-${{ steps.plat.outputs.pair }}
          cache-to:   type=gha,scope=pr-build-${{ steps.plat.outputs.pair }},mode=max

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: pr-digests-${{ steps.plat.outputs.pair }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # -------------------------------------------------------------------
  # Merge per-platform digests into a multi-arch manifest with the
  # sha-<short> and pr-<num> tags. Then comment back on the PR and close
  # the check run.
  # -------------------------------------------------------------------
  pr-build-merge:
    name: pr-build merge & tag
    needs: [pr-build-setup, pr-build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write
      checks: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: pr-digests-*
          merge-multiple: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=sha-${{ needs.pr-build-setup.outputs.short_sha }}
            type=raw,value=pr-${{ needs.pr-build-setup.outputs.number }}

      - name: Create multi-arch manifest
        working-directory: ${{ runner.temp }}/digests
        run: |
          set -euo pipefail
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          # Build the tag args list from metadata-action's output.
          tags=()
          while IFS= read -r t; do
            [[ -n "$t" ]] && tags+=( "-t" "$t" )
          done <<< "${{ steps.meta.outputs.tags }}"
          # Build the source list (one digest reference per platform).
          srcs=()
          for d in *; do
            srcs+=( "$IMG@sha256:$d" )
          done
          docker buildx imagetools create "${tags[@]}" "${srcs[@]}"

      - name: Reply with image tag
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ needs.pr-build-setup.outputs.number }}
          body: |
            Built and pushed (multi-arch, native runners):

            - `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ needs.pr-build-setup.outputs.short_sha }}`
            - `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pr-${{ needs.pr-build-setup.outputs.number }}`

            On merge to `main`, `sha-${{ needs.pr-build-setup.outputs.short_sha }}` will be retagged as `:latest` and the current `VERSION` tags.

      - name: Close check run
        if: always() && needs.pr-build-setup.outputs.check_id != ''
        uses: actions/github-script@v9
        with:
          script: |
            const id = Number('${{ needs.pr-build-setup.outputs.check_id }}');
            // Roll up status: this job ran, but we also care if any matrix builder failed.
            const buildStatus = '${{ needs.pr-build.result }}'.toLowerCase();
            const status = buildStatus === 'success' ? 'success'
                         : buildStatus === 'cancelled' ? 'cancelled'
                         : 'failure';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.checks.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_run_id: id,
              status: 'completed',
              conclusion: status,
              completed_at: new Date().toISOString(),
              details_url: runUrl,
              output: {
                title: status === 'success' ? 'Built and pushed' : `Build ${status}`,
                summary: `[Workflow run](${runUrl})`,
              },
            });

  # -------------------------------------------------------------------
  # Retag on merge — no rebuild. Use buildx imagetools to retag the
  # multi-arch manifest pushed by the PR build.
  # -------------------------------------------------------------------
  retag-latest:
    name: Retag PR image as :latest (+ version tags) on merge
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout (for VERSION)
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Read VERSION
        id: version
        run: |
          v=$(cat VERSION)
          IFS='.' read -r MAJOR MINOR _ <<< "$v"
          echo "value=$v"             >> "$GITHUB_OUTPUT"
          echo "minor=${MAJOR}.${MINOR}" >> "$GITHUB_OUTPUT"
          echo "major=${MAJOR}"        >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA
        id: sha
        env:
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: echo "short=${GITHUB_HEAD_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Retag multi-arch manifest (:latest + version tags)
        run: |
          set -euo pipefail
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          SRC="$IMG:sha-${{ steps.sha.outputs.short }}"
          docker buildx imagetools create \
            --tag "$IMG:latest" \
            --tag "$IMG:${{ steps.version.outputs.value }}" \
            --tag "$IMG:${{ steps.version.outputs.minor }}" \
            --tag "$IMG:${{ steps.version.outputs.major }}" \
            "$SRC"

  # -------------------------------------------------------------------
  # Tagged release build — full semver matrix + latest. Same per-arch
  # native runner pattern as pr-build, then a merge job names the tags.
  # -------------------------------------------------------------------
  tag-build:
    name: tag-build ${{ matrix.platform }}
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Prepare platform tag
        id: plat
        run: |
          p="${{ matrix.platform }}"
          echo "pair=${p//\//-}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Read VERSION
        id: version
        run: echo "value=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.value }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            IMAGE_VERSION=${{ steps.version.outputs.value }}
            IMAGE_REVISION=${{ github.sha }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=tag-build-${{ steps.plat.outputs.pair }}
          cache-to:   type=gha,scope=tag-build-${{ steps.plat.outputs.pair }},mode=max

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: tag-digests-${{ steps.plat.outputs.pair }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  tag-build-merge:
    name: tag-build merge & tag
    needs: tag-build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: tag-digests-*
          merge-multiple: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Create multi-arch manifest
        working-directory: ${{ runner.temp }}/digests
        run: |
          set -euo pipefail
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          tags=()
          while IFS= read -r t; do
            [[ -n "$t" ]] && tags+=( "-t" "$t" )
          done <<< "${{ steps.meta.outputs.tags }}"
          srcs=()
          for d in *; do
            srcs+=( "$IMG@sha256:$d" )
          done
          docker buildx imagetools create "${tags[@]}" "${srcs[@]}"
