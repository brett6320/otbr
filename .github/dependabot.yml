version: 2
updates:
  # GitHub Actions in .github/workflows/*.yml
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"

  # Base image (FROM) in Dockerfile.
  # Note: upstream OTBR sources are pinned via OTBR_REF build-arg, not a
  # package ecosystem, so dependabot will only touch the FROM line.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    ignore:
      # We pin Ubuntu to an LTS release (24.04) on purpose — OTBR's
      # script/bootstrap is only validated against LTS. Allow minor /
      # patch bumps within 24.x, but skip major bumps. Re-evaluate
      # manually when a new LTS lands.
      - dependency-name: ubuntu
        update-types:
          - version-update:semver-major
