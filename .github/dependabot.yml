version: 2
updates:
  # GitHub Actions in .github/workflows/*.yml
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"

  # Base image (FROM) in Dockerfile.
  # Note: upstream OTBR sources are pinned via OTBR_REF build-arg, not a
  # package ecosystem, so dependabot will only touch the FROM line.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    ignore:
      # We pin Ubuntu to an LTS release (24.04) on purpose — OTBR's
      # script/bootstrap is only validated against LTS. Ubuntu's X.04
      # tags auto-track the latest LTS point release on Docker Hub, so
      # we don't need dependabot proposing X.Y bumps at all:
      #   - semver-major  → blocks 24.04 → 25.x / 26.x (next LTS).
      #   - semver-minor  → blocks 24.04 → 24.10 (interim, 9-month
      #                     support; Oracular/Plucky/etc. are NOT LTS).
      # Patch bumps (24.04.1 → 24.04.2) still come through. Re-evaluate
      # the major rule manually when a new LTS lands (26.04, Apr 2026).
      - dependency-name: ubuntu
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
